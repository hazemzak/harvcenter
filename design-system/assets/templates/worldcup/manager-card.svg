<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1080 1350" font-family="Cairo, sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="#1A2744"/>

  <!-- ===== TOP BAR (RTL) ===== -->
  <image href="../../../logo/mark.png" x="960" y="20" width="60" height="70"/>
  <text x="948" y="65" font-size="28" font-weight="700" fill="#FFFFFF" direction="rtl" text-anchor="end">هارفورد</text>
  <line x1="50" y1="100" x2="1030" y2="100" stroke="#D42027" stroke-width="3"/>

  <!-- ===== FORMATION MINI-DIAGRAM (top-right) ===== -->
  <g transform="translate(900, 160)">
    <text x="100" y="0" font-size="14" font-weight="600" fill="#7D8AA0" text-anchor="end">3-3-3</text>
    <circle cx="80" cy="25" r="4" fill="#D42027"/>
    <circle cx="50" cy="20" r="4" fill="#D42027"/>
    <circle cx="20" cy="25" r="4" fill="#D42027"/>
    <circle cx="80" cy="55" r="4" fill="#D42027"/>
    <circle cx="50" cy="60" r="4" fill="#D42027"/>
    <circle cx="20" cy="55" r="4" fill="#D42027"/>
    <circle cx="80" cy="85" r="4" fill="#D42027"/>
    <circle cx="50" cy="88" r="4" fill="#D42027"/>
    <circle cx="20" cy="85" r="4" fill="#D42027"/>
    <circle cx="50" cy="110" r="4" fill="#D42027"/>
  </g>

  <!-- ===== LEFT SIDE: Manager Photo ===== -->
  <rect x="0" y="120" width="540" height="1100" rx="0" fill="#2B3A56"/>
  <!-- Logo watermark — branded into photo area -->
  <image href="../../../logo/mark.png" x="80" y="350" width="380" height="440" opacity="0.07"/>
  <text x="270" y="640" font-size="22" font-weight="600" fill="#3D4C6B" text-anchor="middle" direction="rtl">صورة المدير</text>

  <!-- ===== RIGHT CONTENT (RTL) ===== -->
  <!-- Title -->
  <text x="980" y="460" font-size="80" font-weight="700" fill="#D42027" direction="rtl" text-anchor="end" opacity="0.9">المدير</text>

  <!-- Name -->
  <text x="980" y="560" font-size="44" font-weight="700" fill="#FFFFFF" direction="rtl" text-anchor="end">أحمد زكريا الحكيم</text>

  <!-- Role -->
  <text x="980" y="620" font-size="26" font-weight="600" fill="#D42027" direction="rtl" text-anchor="end">مدير سنتر هارفورد</text>

  <!-- MANAGER badge -->
  <rect x="830" y="645" width="150" height="40" rx="8" fill="#D42027"/>
  <text x="905" y="672" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">MANAGER</text>

  <!-- Assistant Manager section -->
  <text x="980" y="750" font-size="20" font-weight="400" fill="#7D8AA0" direction="rtl" text-anchor="end">مساعد المدير</text>
  <text x="980" y="790" font-size="32" font-weight="700" fill="#FFFFFF" direction="rtl" text-anchor="end">محمود عبدالمعطي</text>
  <rect x="800" y="810" width="180" height="36" rx="8" fill="#C9993A"/>
  <text x="890" y="835" font-size="15" font-weight="700" fill="#1A2744" text-anchor="middle">ASST. MANAGER</text>

  <!-- Full roster (compact, right-aligned) -->
  <g transform="translate(0, 910)" font-size="16">
    <text x="980" y="0" font-weight="600" fill="#7D8AA0" direction="rtl" text-anchor="end">التشكيلة</text>

    <text x="980" y="34" fill="#D42027" font-weight="700" text-anchor="end">1</text>
    <text x="960" y="34" fill="#5A6784" text-anchor="end" direction="rtl">الشناوي</text>
    <text x="740" y="34" fill="#3D4C6B" font-size="13">كيمياء</text>

    <text x="980" y="62" fill="#D42027" font-weight="700" text-anchor="end">3</text>
    <text x="960" y="62" fill="#5A6784" text-anchor="end" direction="rtl">ناصر البطل</text>
    <text x="740" y="62" fill="#3D4C6B" font-size="13">كيمياء</text>

    <text x="980" y="90" fill="#D42027" font-weight="700" text-anchor="end">4</text>
    <text x="960" y="90" fill="#5A6784" text-anchor="end" direction="rtl">محمد طلبة</text>
    <text x="740" y="90" fill="#3D4C6B" font-size="13">تاريخ</text>

    <text x="980" y="118" fill="#D42027" font-weight="700" text-anchor="end">5</text>
    <text x="960" y="118" fill="#5A6784" text-anchor="end" direction="rtl">طارق عصام</text>
    <text x="740" y="118" fill="#3D4C6B" font-size="13">كيمياء</text>

    <text x="980" y="146" fill="#D42027" font-weight="700" text-anchor="end">6</text>
    <text x="960" y="146" fill="#5A6784" text-anchor="end" direction="rtl">مازن الحيوان</text>
    <text x="740" y="146" fill="#3D4C6B" font-size="13">رياضيات</text>

    <text x="980" y="174" fill="#D42027" font-weight="700" text-anchor="end">7</text>
    <text x="960" y="174" fill="#5A6784" text-anchor="end" direction="rtl">محمد صبري</text>
    <text x="740" y="174" fill="#3D4C6B" font-size="13">رياضيات</text>

    <text x="980" y="202" fill="#D42027" font-weight="700" text-anchor="end">8</text>
    <text x="960" y="202" fill="#5A6784" text-anchor="end" direction="rtl">علي صلاح</text>
    <text x="740" y="202" fill="#3D4C6B" font-size="13">فلسفة</text>

    <text x="980" y="230" fill="#D42027" font-weight="700" text-anchor="end">9</text>
    <text x="960" y="230" fill="#5A6784" text-anchor="end" direction="rtl">محمد صلاح</text>
    <text x="740" y="230" fill="#3D4C6B" font-size="13">انجليزي</text>

    <text x="980" y="258" fill="#D42027" font-weight="700" text-anchor="end">10</text>
    <text x="955" y="258" fill="#5A6784" text-anchor="end" direction="rtl">محمد الجيوشي</text>
    <text x="740" y="258" fill="#3D4C6B" font-size="13">فيزياء</text>

    <text x="980" y="286" fill="#D42027" font-weight="700" text-anchor="end">11</text>
    <text x="955" y="286" fill="#5A6784" text-anchor="end" direction="rtl">ميلاد مراد</text>
    <text x="740" y="286" fill="#3D4C6B" font-size="13">انجليزي</text>
  </g>

  <!-- ===== BOTTOM: logo + tagline ===== -->
  <line x1="50" y1="1240" x2="1030" y2="1240" stroke="#2B3A56" stroke-width="1"/>
  <image href="../../../logo/mark.png" x="508" y="1255" width="50" height="58"/>
  <text x="540" y="1330" font-size="18" font-weight="400" fill="#7D8AA0" text-anchor="middle" direction="rtl">معاك للنهاية</text>
</svg>
