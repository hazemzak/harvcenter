<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1080 1350" font-family="Cairo, sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="#1A2744"/>

  <!-- ===== TOP BAR (RTL) ===== -->
  <image href="../../../logo/mark.png" x="960" y="20" width="60" height="70"/>
  <text x="948" y="65" font-size="28" font-weight="700" fill="#FFFFFF" direction="rtl" text-anchor="end">هارفورد</text>
  <line x1="50" y1="100" x2="1030" y2="100" stroke="#D42027" stroke-width="3"/>

  <!-- Overline -->
  <text x="1000" y="155" font-size="20" font-weight="600" fill="#D42027" text-anchor="end" letter-spacing="0.12em">STARTING X</text>
  <!-- Title with inline logo -->
  <text x="1000" y="210" font-size="44" font-weight="700" fill="#FFFFFF" direction="rtl" text-anchor="end">تشكيلة</text>
  <image href="../../../logo/mark.png" x="763" y="172" width="40" height="46"/>
  <text x="756" y="210" font-size="44" font-weight="700" fill="#FFFFFF" text-anchor="end">هارفورد ٢٠٢٧</text>

  <!-- ===== LEFT COLUMN: Featured Player Photo ===== -->
  <rect x="50" y="260" width="400" height="700" rx="10" fill="#2B3A56"/>
  <!-- Logo watermark — branded into photo area -->
  <image href="../../../logo/mark.png" x="100" y="380" width="300" height="350" opacity="0.07"/>
  <text x="250" y="620" font-size="22" font-weight="600" fill="#3D4C6B" text-anchor="middle" direction="rtl">صورة المدرس</text>

  <!-- ===== RIGHT COLUMN: ROSTER LIST (RTL) ===== -->

  <text x="1000" y="300" font-size="28" font-weight="700" fill="#D42027" text-anchor="end">1</text>
  <text x="970" y="300" font-size="26" font-weight="600" fill="#FFFFFF" text-anchor="end" direction="rtl">الشناوي</text>
  <text x="630" y="300" font-size="18" font-weight="400" fill="#7D8AA0">كيمياء</text>
  <line x1="500" y1="320" x2="1000" y2="320" stroke="#2B3A56" stroke-width="1"/>

  <text x="1000" y="370" font-size="28" font-weight="700" fill="#D42027" text-anchor="end">3</text>
  <text x="970" y="370" font-size="26" font-weight="600" fill="#FFFFFF" text-anchor="end" direction="rtl">ناصر البطل</text>
  <text x="630" y="370" font-size="18" font-weight="400" fill="#7D8AA0">كيمياء</text>
  <line x1="500" y1="390" x2="1000" y2="390" stroke="#2B3A56" stroke-width="1"/>

  <text x="1000" y="440" font-size="28" font-weight="700" fill="#D42027" text-anchor="end">4</text>
  <text x="970" y="440" font-size="26" font-weight="600" fill="#FFFFFF" text-anchor="end" direction="rtl">محمد طلبة</text>
  <text x="630" y="440" font-size="18" font-weight="400" fill="#7D8AA0">تاريخ</text>
  <line x1="500" y1="460" x2="1000" y2="460" stroke="#2B3A56" stroke-width="1"/>

  <text x="1000" y="510" font-size="28" font-weight="700" fill="#D42027" text-anchor="end">5</text>
  <text x="970" y="510" font-size="26" font-weight="600" fill="#FFFFFF" text-anchor="end" direction="rtl">طارق عصام</text>
  <text x="630" y="510" font-size="18" font-weight="400" fill="#7D8AA0">كيمياء</text>
  <line x1="500" y1="530" x2="1000" y2="530" stroke="#2B3A56" stroke-width="1"/>

  <text x="1000" y="580" font-size="28" font-weight="700" fill="#D42027" text-anchor="end">6</text>
  <text x="970" y="580" font-size="26" font-weight="600" fill="#FFFFFF" text-anchor="end" direction="rtl">مازن الحيوان</text>
  <text x="630" y="580" font-size="18" font-weight="400" fill="#7D8AA0">رياضيات وإحصاء</text>
  <line x1="500" y1="600" x2="1000" y2="600" stroke="#2B3A56" stroke-width="1"/>

  <text x="1000" y="650" font-size="28" font-weight="700" fill="#D42027" text-anchor="end">7</text>
  <text x="970" y="650" font-size="26" font-weight="600" fill="#FFFFFF" text-anchor="end" direction="rtl">محمد صبري</text>
  <text x="630" y="650" font-size="18" font-weight="400" fill="#7D8AA0">رياضيات</text>
  <line x1="500" y1="670" x2="1000" y2="670" stroke="#2B3A56" stroke-width="1"/>

  <text x="1000" y="720" font-size="28" font-weight="700" fill="#D42027" text-anchor="end">8</text>
  <text x="970" y="720" font-size="26" font-weight="600" fill="#FFFFFF" text-anchor="end" direction="rtl">علي صلاح</text>
  <text x="630" y="720" font-size="18" font-weight="400" fill="#7D8AA0">فلسفة</text>
  <line x1="500" y1="740" x2="1000" y2="740" stroke="#2B3A56" stroke-width="1"/>

  <text x="1000" y="790" font-size="28" font-weight="700" fill="#D42027" text-anchor="end">9</text>
  <text x="970" y="790" font-size="26" font-weight="600" fill="#FFFFFF" text-anchor="end" direction="rtl">محمد صلاح</text>
  <text x="630" y="790" font-size="18" font-weight="400" fill="#7D8AA0">انجليزي</text>
  <line x1="500" y1="810" x2="1000" y2="810" stroke="#2B3A56" stroke-width="1"/>

  <text x="1000" y="860" font-size="28" font-weight="700" fill="#D42027" text-anchor="end">10</text>
  <text x="965" y="860" font-size="26" font-weight="600" fill="#FFFFFF" text-anchor="end" direction="rtl">محمد الجيوشي</text>
  <text x="630" y="860" font-size="18" font-weight="400" fill="#7D8AA0">فيزياء</text>
  <line x1="500" y1="880" x2="1000" y2="880" stroke="#2B3A56" stroke-width="1"/>

  <text x="1000" y="930" font-size="28" font-weight="700" fill="#D42027" text-anchor="end">11</text>
  <text x="965" y="930" font-size="26" font-weight="600" fill="#FFFFFF" text-anchor="end" direction="rtl">ميلاد مراد</text>
  <text x="630" y="930" font-size="18" font-weight="400" fill="#7D8AA0">انجليزي</text>
  <line x1="500" y1="950" x2="1000" y2="950" stroke="#2B3A56" stroke-width="1"/>

  <!-- ===== COACHING STAFF (bottom, RTL) ===== -->
  <line x1="50" y1="1060" x2="1030" y2="1060" stroke="#2B3A56" stroke-width="1.5"/>

  <!-- Manager (right side) -->
  <g transform="translate(850, 1140)">
    <circle cx="0" cy="0" r="26" fill="#3D4C6B" stroke="#D42027" stroke-width="2"/>
    <text x="-38" y="-8" font-size="14" font-weight="400" fill="#7D8AA0" text-anchor="end">MANAGER</text>
    <text x="-38" y="16" font-size="20" font-weight="700" fill="#FFFFFF" direction="rtl" text-anchor="end">أحمد زكريا الحكيم</text>
  </g>

  <!-- Assistant Manager (left side) -->
  <g transform="translate(350, 1140)">
    <circle cx="0" cy="0" r="26" fill="#3D4C6B" stroke="#C9993A" stroke-width="2"/>
    <text x="-38" y="-8" font-size="14" font-weight="400" fill="#7D8AA0" text-anchor="end">ASST. MANAGER</text>
    <text x="-38" y="16" font-size="20" font-weight="700" fill="#FFFFFF" direction="rtl" text-anchor="end">محمود عبدالمعطي</text>
  </g>

  <!-- Bottom: logo + tagline -->
  <image href="../../../logo/mark.png" x="508" y="1255" width="50" height="58"/>
  <text x="540" y="1330" font-size="18" font-weight="400" fill="#7D8AA0" text-anchor="middle" direction="rtl">معاك للنهاية</text>
</svg>
