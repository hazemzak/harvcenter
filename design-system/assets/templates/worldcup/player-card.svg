<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1080 1350" font-family="Cairo, sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="#1A2744"/>

  <!-- ===== TOP BAR (RTL — logo + name on right) ===== -->
  <image href="../../../logo/mark.png" x="960" y="20" width="60" height="70"/>
  <text x="948" y="65" font-size="28" font-weight="700" fill="#FFFFFF" direction="rtl" text-anchor="end">هارفورد</text>
  <line x1="50" y1="100" x2="1030" y2="100" stroke="#D42027" stroke-width="3"/>

  <!-- ===== FORMATION MINI-DIAGRAM (top-right) ===== -->
  <g transform="translate(900, 160)">
    <text x="100" y="0" font-size="14" font-weight="600" fill="#7D8AA0" text-anchor="end">3-3-3</text>
    <circle cx="80" cy="25" r="5" fill="#D42027"/>
    <circle cx="50" cy="20" r="4" fill="#7D8AA0"/>
    <circle cx="20" cy="25" r="4" fill="#7D8AA0"/>
    <circle cx="80" cy="55" r="4" fill="#7D8AA0"/>
    <circle cx="50" cy="60" r="4" fill="#7D8AA0"/>
    <circle cx="20" cy="55" r="4" fill="#7D8AA0"/>
    <circle cx="80" cy="85" r="4" fill="#7D8AA0"/>
    <circle cx="50" cy="88" r="4" fill="#7D8AA0"/>
    <circle cx="20" cy="85" r="4" fill="#7D8AA0"/>
    <circle cx="50" cy="110" r="4" fill="#7D8AA0"/>
  </g>

  <!-- ===== LEFT SIDE: Teacher Photo ===== -->
  <!-- PHOTO_PLACEHOLDER: Replace with teacher photo (arms crossed, bg removed) -->
  <rect x="0" y="120" width="540" height="1100" rx="0" fill="#2B3A56"/>
  <!-- Logo watermark — branded into photo area -->
  <image href="../../../logo/mark.png" x="80" y="350" width="380" height="440" opacity="0.07"/>
  <text x="270" y="680" font-size="22" font-weight="600" fill="#3D4C6B" text-anchor="middle" direction="rtl">صورة المدرس</text>

  <!-- ===== RIGHT CONTENT (RTL) ===== -->
  <!-- Player number — HUGE -->
  <text x="980" y="520" font-size="200" font-weight="700" fill="#D42027" opacity="0.9" text-anchor="end">٩</text>

  <!-- Player name -->
  <text x="980" y="620" font-size="48" font-weight="700" fill="#FFFFFF" direction="rtl" text-anchor="end">محمد صلاح</text>

  <!-- Subject -->
  <text x="980" y="680" font-size="28" font-weight="600" fill="#D42027" direction="rtl" text-anchor="end">اللغة الانجليزية</text>

  <!-- Position badge -->
  <rect x="910" y="700" width="70" height="36" rx="8" fill="#D42027"/>
  <text x="945" y="725" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">LW</text>

  <!-- Roster list (compact, right-aligned) -->
  <g transform="translate(600, 820)" font-size="16">
    <text x="400" y="0" fill="#D42027" font-weight="700" text-anchor="end">1</text>
    <text x="385" y="0" fill="#5A6784" font-weight="400" text-anchor="end" direction="rtl">الشناوي</text>

    <text x="400" y="34" fill="#D42027" font-weight="700" text-anchor="end">3</text>
    <text x="385" y="34" fill="#5A6784" font-weight="400" text-anchor="end" direction="rtl">ناصر البطل</text>

    <text x="400" y="68" fill="#D42027" font-weight="700" text-anchor="end">4</text>
    <text x="385" y="68" fill="#5A6784" font-weight="400" text-anchor="end" direction="rtl">محمد طلبة</text>

    <text x="400" y="102" fill="#D42027" font-weight="700" text-anchor="end">5</text>
    <text x="385" y="102" fill="#5A6784" font-weight="400" text-anchor="end" direction="rtl">طارق عصام</text>

    <text x="400" y="136" fill="#D42027" font-weight="700" text-anchor="end">6</text>
    <text x="385" y="136" fill="#5A6784" font-weight="400" text-anchor="end" direction="rtl">مازن الحيوان</text>

    <text x="400" y="170" fill="#D42027" font-weight="700" text-anchor="end">7</text>
    <text x="385" y="170" fill="#5A6784" font-weight="400" text-anchor="end" direction="rtl">محمد صبري</text>

    <text x="400" y="204" fill="#D42027" font-weight="700" text-anchor="end">8</text>
    <text x="385" y="204" fill="#5A6784" font-weight="400" text-anchor="end" direction="rtl">علي صلاح</text>

    <text x="400" y="238" fill="#FFFFFF" font-weight="700" text-anchor="end">9</text>
    <text x="385" y="238" fill="#FFFFFF" font-weight="600" text-anchor="end" direction="rtl">محمد صلاح</text>

    <text x="400" y="272" fill="#D42027" font-weight="700" text-anchor="end">10</text>
    <text x="380" y="272" fill="#5A6784" font-weight="400" text-anchor="end" direction="rtl">محمد الجيوشي</text>

    <text x="400" y="306" fill="#D42027" font-weight="700" text-anchor="end">11</text>
    <text x="380" y="306" fill="#5A6784" font-weight="400" text-anchor="end" direction="rtl">ميلاد مراد</text>
  </g>

  <!-- ===== BOTTOM: logo + tagline ===== -->
  <line x1="50" y1="1240" x2="1030" y2="1240" stroke="#2B3A56" stroke-width="1"/>
  <image href="../../../logo/mark.png" x="508" y="1255" width="50" height="58"/>
  <text x="540" y="1330" font-size="18" font-weight="400" fill="#7D8AA0" text-anchor="middle" direction="rtl">معاك للنهاية</text>
</svg>
