<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <rect width="1080" height="1350" fill="{{PAPER_HEX}}"/>

  <!-- Slide number kicker -->
  <text x="72" y="180"
        font-family="{{FONT_FAMILY}}, ui-sans-serif, system-ui, sans-serif"
        font-weight="600"
        font-size="22"
        letter-spacing="0.08em"
        fill="{{PRIMARY_HEX}}">{{SLIDE_KICKER_UPPERCASE}}</text>

  <!-- H2 headline (up to 3 lines, dy=80 between) -->
  <text x="72" y="340"
        font-family="{{FONT_FAMILY}}, ui-sans-serif, system-ui, sans-serif"
        font-weight="600"
        font-size="64"
        letter-spacing="-0.015em"
        fill="{{INK_HEX}}">
    <tspan x="72" dy="0">{{BODY_HEADLINE_LINE_1}}</tspan>
    <tspan x="72" dy="80">{{BODY_HEADLINE_LINE_2}}</tspan>
    <tspan x="72" dy="80">{{BODY_HEADLINE_LINE_3}}</tspan>
  </text>

  <!-- Body paragraph (4 lines, dy=48 between) -->
  <text x="72" y="770"
        font-family="{{FONT_FAMILY}}, ui-sans-serif, system-ui, sans-serif"
        font-weight="400"
        font-size="32"
        fill="{{INK_600_HEX}}">
    <tspan x="72" dy="0">{{BODY_LINE_1}}</tspan>
    <tspan x="72" dy="48">{{BODY_LINE_2}}</tspan>
    <tspan x="72" dy="48">{{BODY_LINE_3}}</tspan>
    <tspan x="72" dy="80" fill="{{INK_HEX}}" font-weight="500">{{BODY_EMPHASIS_LINE}}</tspan>
  </text>

  <!-- Footer -->
  <g transform="translate(0, 1238)">
    <rect x="72" y="0" width="936" height="1" fill="{{LINE_HEX}}"/>
    <g transform="translate(72, 36) scale(0.8)">
      {{MOTIF_PATHS}}
    </g>
    <text x="140" y="80"
          font-family="{{FONT_FAMILY}}, ui-sans-serif, system-ui, sans-serif"
          font-weight="700"
          font-size="26"
          letter-spacing="-0.02em"
          fill="{{INK_HEX}}">{{BRAND_NAME}}</text>
    <text x="1008" y="80"
          text-anchor="end"
          font-family="{{FONT_FAMILY}}, ui-sans-serif, system-ui, sans-serif"
          font-weight="500"
          font-size="18"
          fill="{{INK_500_HEX}}">{{SLIDE_NUMBER}} / {{SLIDE_COUNT}} →</text>
  </g>
</svg>
