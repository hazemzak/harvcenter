<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" role="img" aria-label="{{BRAND_NAME}} logo, stacked">
  <title>{{BRAND_NAME}}</title>
  <g transform="translate(68, 8)">
    {{MOTIF_PATHS}}
  </g>
  <text x="100" y="128"
        text-anchor="middle"
        font-family="{{FONT_FAMILY}}, 'Inter Variable', ui-sans-serif, system-ui, sans-serif"
        font-weight="700"
        font-size="36"
        letter-spacing="-0.02em"
        fill="{{INK_HEX}}">{{BRAND_NAME}}</text>
</svg>
