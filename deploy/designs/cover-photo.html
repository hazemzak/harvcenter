<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no">
<title>Harv — Facebook Cover Photo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  a[href^="tel"] { color: inherit; text-decoration: none; }

  .cover {
    width: 1640px;
    height: 624px;
    background: #1A2744;
    font-family: 'Cairo', sans-serif;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
  }

  /* Tilted logo mark watermark pattern */
  .cover::before {
    content: '';
    position: absolute;
    inset: -30%;
    background-image: url("../design-system/logo/mark.png");
    background-size: 90px auto;
    background-repeat: repeat;
    background-position: 0 0;
    opacity: 0.025;
    filter: brightness(10);
    transform: rotate(-12deg);
    pointer-events: none;
  }

  /* Thin red accent strip at bottom */
  .bottom-strip {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 5px;
    background: #D42027;
  }

  /* Content area — RTL: text right, logo left */
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 0 80px;
  }

  /* Text block — right side in RTL */
  .text-block {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: 680px;
  }

  .center-name {
    font-size: 52px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.2;
    letter-spacing: -0.01em;
  }

  .tagline {
    font-size: 28px;
    font-weight: 600;
    color: #D42027;
    line-height: 1.3;
    margin-top: 4px;
  }

  .stages {
    font-size: 20px;
    font-weight: 500;
    color: #E8EBF0;
    line-height: 1.5;
    margin-top: 8px;
  }

  .stages span {
    color: #FFFFFF;
    font-weight: 600;
  }

  .stats-row {
    display: flex;
    gap: 32px;
    margin-top: 20px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .stat-number {
    font-size: 32px;
    font-weight: 700;
    color: #D42027;
    line-height: 1;
  }

  .stat-label {
    font-size: 13px;
    font-weight: 500;
    color: #A3ACBC;
  }

  .stat-divider {
    width: 1px;
    height: 48px;
    background: #2B3A56;
    align-self: center;
  }

  .contact-row {
    display: flex;
    gap: 24px;
    align-items: center;
    margin-top: 20px;
    font-size: 14px;
    color: #A3ACBC;
    font-weight: 400;
  }

  .contact-row svg {
    width: 14px;
    height: 14px;
    fill: #A3ACBC;
    flex-shrink: 0;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Logo block — left side in RTL */
  .logo-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
  }

  .logo-block img {
    width: 260px;
    height: auto;
  }
</style>
</head>
<body>
<div class="cover">
  <div class="bottom-strip"></div>
  <div class="content">
    <!-- Text block (right side — RTL) -->
    <div class="text-block">
      <div class="center-name">مركز هارفورد التعليمي</div>
      <div class="tagline">معاك للنهاية</div>
      <div class="stages">
        جميع المراحل التعليمية<br>
        <span>[ إعدادية · بكالوريا · ثانوية عامة ]</span>
      </div>

      <div class="stats-row">
        <div class="stat">
          <div class="stat-number">14</div>
          <div class="stat-label">مدرس متخصص</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <div class="stat-number">+8</div>
          <div class="stat-label">مواد</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <div class="stat-number">97%</div>
          <div class="stat-label">نسبة نجاح</div>
        </div>
      </div>

      <div class="contact-row">
        <div class="contact-item">
          <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/></svg>
          مدينة نصر · بجوار بنزينة كار جاس · أمام عقارات السوسري أ
        </div>
        <div class="contact-item">
          <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
          <span dir="ltr">01064949395</span> | <span dir="ltr">01223463448</span> | <span dir="ltr">02-24734371</span>
        </div>
      </div>
    </div>

    <!-- Logo (left side — RTL) -->
    <div class="logo-block">
      <img src="../design-system/logo/mark.png" alt="Harv H mark">
    </div>
  </div>
</div>
</body>
</html>
