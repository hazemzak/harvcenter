<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no">
<title>Harv — Teacher Card Post</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  a[href^="tel"] { color: inherit; text-decoration: none; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f0f0f0;
  }

  /* 4:5 Instagram ratio */
  .post {
    width: 1080px;
    height: 1350px;
    background: #1A2744;
    font-family: 'Cairo', sans-serif;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Tilted logo mark watermark pattern */
  .post::before {
    content: '';
    position: absolute;
    inset: -30%;
    background-image: url("../design-system/logo/mark.png");
    background-size: 90px auto;
    background-repeat: repeat;
    background-position: 0 0;
    opacity: 0.025;
    filter: brightness(10);
    transform: rotate(-12deg);
    pointer-events: none;
    z-index: 0;
  }

  /* Top bar */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 48px 60px 0;
    position: relative;
    z-index: 1;
  }

  .logo-mark {
    width: 64px;
    height: auto;
  }

  /* Language flag indicator — English (UK) */
  .flag-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.08);
    border-radius: 100px;
    padding: 8px 16px;
  }

  .flag-dot {
    width: 28px;
    height: 20px;
    border-radius: 3px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .flag-dot .stripe-r { flex: 1; background: #D42027; }
  .flag-dot .stripe-w { flex: 1; background: #FFFFFF; }
  .flag-dot .stripe-b { flex: 1; background: #1A2744; }

  .flag-label {
    font-size: 13px;
    font-weight: 500;
    color: #A3ACBC;
  }

  /* Subject info */
  .subject-section {
    padding: 32px 60px 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .overline {
    font-size: 13px;
    font-weight: 600;
    color: #D42027;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .subject-name {
    font-size: 36px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.25;
  }

  .grade-level {
    font-size: 16px;
    font-weight: 400;
    color: #D42027;
    margin-top: 2px;
  }

  /* Teacher photo area */
  .teacher-area {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding: 0;
    position: relative;
    overflow: hidden;
    min-height: 0;
  }

  .teacher-photo {
    width: 90%;
    max-width: 750px;
    height: auto;
    object-fit: contain;
  }

  /* Teacher name */
  .teacher-name-section {
    padding: 24px 60px 0;
    text-align: center;
  }

  .teacher-title {
    font-size: 14px;
    font-weight: 500;
    color: #A3ACBC;
  }

  .teacher-name {
    font-size: 28px;
    font-weight: 600;
    color: #FFFFFF;
    line-height: 1.3;
  }

  /* Schedule bar */
  .schedule-bar {
    margin: 24px 60px;
    background: #D42027;
    border-radius: 12px;
    padding: 16px 24px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
  }

  .schedule-item {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #FFFFFF;
    font-size: 16px;
    font-weight: 600;
  }

  .schedule-item svg {
    width: 18px;
    height: 18px;
    fill: #FFFFFF;
    opacity: 0.8;
  }

  .schedule-divider {
    width: 1px;
    height: 20px;
    background: rgba(255,255,255,0.3);
  }

  /* Features row at bottom */
  .features-row {
    padding: 0 60px 24px;
    display: flex;
    justify-content: center;
    gap: 40px;
  }

  .feature {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 500;
    color: #7D8AA0;
  }

  .feature-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #D42027;
    flex-shrink: 0;
  }

  /* Bottom contact strip */
  .bottom-contact {
    background: rgba(255,255,255,0.04);
    padding: 16px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .contact-text {
    font-size: 14px;
    font-weight: 500;
    color: #A3ACBC;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .contact-text svg {
    width: 14px;
    height: 14px;
    fill: #A3ACBC;
  }

  .harv-wordmark {
    font-size: 14px;
    font-weight: 600;
    color: #5A6784;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<div class="post">
  <!-- Top bar: logo + flag -->
  <div class="top-bar">
    <img class="logo-mark" src="../design-system/logo/mark.png" alt="H">
    <div class="flag-indicator">
      <div class="flag-dot">
        <div class="stripe-r"></div>
        <div class="stripe-w"></div>
        <div class="stripe-b"></div>
      </div>
      <span class="flag-label">ENGLISH</span>
    </div>
  </div>

  <!-- Subject info -->
  <div class="subject-section">
    <div class="overline">TEACHER ANNOUNCEMENT</div>
    <div class="subject-name">اللغة الإنجليزية</div>
    <div class="grade-level">الصف الثالث الثانوي</div>
  </div>

  <!-- Teacher photo -->
  <div class="teacher-area">
    <img class="teacher-photo" src="milad-mourad-cutout.png" alt="Mr. Milad Mourad">
  </div>

  <!-- Teacher name -->
  <div class="teacher-name-section">
    <div class="teacher-title">مستر</div>
    <div class="teacher-name">ميلاد مراد</div>
  </div>

  <!-- Schedule bar -->
  <div class="schedule-bar">
    <div class="schedule-item">
      <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/></svg>
      يوم السبت 28/6
    </div>
    <div class="schedule-divider"></div>
    <div class="schedule-item">
      <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
      الساعة 6:30 م
    </div>
  </div>

  <!-- Features -->
  <div class="features-row">
    <div class="feature">
      <div class="feature-dot"></div>
      مراجعة شاملة
    </div>
    <div class="feature">
      <div class="feature-dot"></div>
      أهم الأسئلة المتوقعة
    </div>
    <div class="feature">
      <div class="feature-dot"></div>
      تدريب على النماذج
    </div>
  </div>

  <!-- Bottom contact -->
  <div class="bottom-contact">
    <div class="contact-text">
      <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
      <span dir="ltr">01064949395</span> | <span dir="ltr">02-24734371</span>
    </div>
    <div class="harv-wordmark">Harvard Education Center</div>
  </div>
</div>
</body>
</html>
