<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no">
<title>Harv — Enrollment 2027 Post</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  a[href^="tel"] { color: inherit; text-decoration: none; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f0f0f0;
  }

  .post {
    width: 1080px;
    height: 1350px;
    background: #1A2744;
    font-family: 'Cairo', sans-serif;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Tilted logo mark watermark pattern */
  .post::before {
    content: '';
    position: absolute;
    inset: -30%;
    background-image: url("../design-system/logo/mark.png");
    background-size: 90px auto;
    background-repeat: repeat;
    background-position: 0 0;
    opacity: 0.025;
    filter: brightness(10);
    transform: rotate(-12deg);
    pointer-events: none;
  }

  .top-bar {
    padding: 48px 60px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    position: relative;
    z-index: 2;
  }

  .logo-mark {
    width: 64px;
    height: auto;
  }

  .overline-tag {
    font-size: 13px;
    font-weight: 600;
    color: #A3ACBC;
    letter-spacing: 0.04em;
    background: rgba(255,255,255,0.06);
    padding: 6px 16px;
    border-radius: 100px;
  }

  /* Main content */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 60px;
    position: relative;
    z-index: 2;
    gap: 8px;
  }

  .headline {
    font-size: 44px;
    font-weight: 700;
    color: #FFFFFF;
    text-align: center;
    line-height: 1.25;
  }

  .year {
    font-size: 120px;
    font-weight: 700;
    color: #D42027;
    line-height: 1;
    text-align: center;
    margin: 8px 0 16px;
  }

  /* Curriculum pills */
  .curriculum-row {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-top: 8px;
  }

  .curriculum-pill {
    padding: 14px 32px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 600;
    text-align: center;
  }

  .pill-primary {
    background: #D42027;
    color: #FFFFFF;
  }

  .pill-outline {
    background: transparent;
    color: #FFFFFF;
    border: 2px solid #2B3A56;
  }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 48px;
    margin-top: 40px;
    justify-content: center;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .stat-number {
    font-size: 40px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1;
  }

  .stat-label {
    font-size: 14px;
    font-weight: 500;
    color: #7D8AA0;
  }

  .stat-divider {
    width: 1px;
    height: 56px;
    background: #2B3A56;
    align-self: center;
  }

  /* Contact section */
  .contact-section {
    padding: 0 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    margin-top: auto;
    position: relative;
    z-index: 2;
  }

  .cta-button {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #FFFFFF;
    color: #1A2744;
    padding: 16px 40px;
    border-radius: 100px;
    font-size: 18px;
    font-weight: 600;
    text-decoration: none;
  }

  .cta-button svg {
    width: 22px;
    height: 22px;
    fill: #25D366;
  }

  .location-text {
    font-size: 14px;
    font-weight: 400;
    color: #7D8AA0;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .location-text svg {
    width: 14px;
    height: 14px;
    fill: #7D8AA0;
  }

  /* Bottom bar */
  .bottom-bar {
    margin-top: 24px;
    padding: 20px 60px;
    background: rgba(255,255,255,0.03);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .tagline {
    font-size: 16px;
    font-weight: 600;
    color: #D42027;
  }

  .harv-wordmark {
    font-size: 14px;
    font-weight: 600;
    color: #5A6784;
    letter-spacing: 0.04em;
  }

  /* Decorative red line accent on right edge */
  .edge-accent {
    position: absolute;
    top: 200px;
    right: 0;
    width: 4px;
    height: 200px;
    background: #D42027;
    border-radius: 0 0 0 4px;
  }
</style>
</head>
<body>
<div class="post">
  <div class="edge-accent"></div>

  <div class="top-bar">
    <img class="logo-mark" src="../design-system/logo/mark.png" alt="H">
    <div class="overline-tag">العام الدراسي الجديد</div>
  </div>

  <div class="main-content">
    <div class="headline">الحجز مفتوح</div>
    <div class="year">٢٠٢٧</div>

    <div class="curriculum-row">
      <div class="curriculum-pill pill-primary">ثانوية عامة</div>
      <div class="curriculum-pill pill-outline">بكالوريا</div>
      <div class="curriculum-pill pill-outline">إعدادية</div>
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-number">14</div>
        <div class="stat-label">مدرس</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-number">+8</div>
        <div class="stat-label">مواد</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-number">97%</div>
        <div class="stat-label">نسبة نجاح</div>
      </div>
    </div>
  </div>

  <div class="contact-section">
    <div class="cta-button">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.832-1.438A9.955 9.955 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/></svg>
      واتساب <span dir="ltr">01064949395</span> | أرضي <span dir="ltr">02-24734371</span>
    </div>
    <div class="location-text">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/></svg>
      مدينة نصر — بجوار بنزينة كار جاس — أمام عقارات السوسري أ
    </div>
  </div>

  <div class="bottom-bar">
    <div class="tagline">معاك للنهاية</div>
    <div class="harv-wordmark">Harvard Education Center</div>
  </div>
</div>
</body>
</html>
