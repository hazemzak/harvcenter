<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no">
<title>Harv — QR Code WhatsApp Group Post</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  a[href^="tel"] { color: inherit; text-decoration: none; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f0f0f0;
  }

  /* 1:1 ratio — QR code posts work best square */
  .post {
    width: 1080px;
    height: 1080px;
    background: #FAFAF8;
    font-family: 'Cairo', sans-serif;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Tilted logo pattern on off-white background */
  .post::before {
    content: '';
    position: absolute;
    inset: -30%;
    background-image: url("../design-system/logo/mark.png");
    background-size: 90px auto;
    background-repeat: repeat;
    background-position: 0 0;
    opacity: 0.04;
    transform: rotate(-12deg);
    pointer-events: none;
    z-index: 0;
  }

  /* Top section — navy header */
  .top-header {
    background: #1A2744;
    padding: 40px 60px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 1;
  }

  .header-text {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .header-overline {
    font-size: 13px;
    font-weight: 600;
    color: #D42027;
    letter-spacing: 0.02em;
  }

  .header-title {
    font-size: 28px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.3;
  }

  .header-subtitle {
    font-size: 16px;
    font-weight: 400;
    color: #A3ACBC;
  }

  .logo-mark {
    width: 56px;
    height: auto;
  }

  /* Main content — QR area */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    padding: 40px 60px;
    gap: 24px;
  }

  .scan-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 16px;
    font-weight: 600;
    color: #1A2744;
    background: #FFFFFF;
    border: 2px solid #E5E7EB;
    border-radius: 100px;
    padding: 10px 24px;
  }

  .scan-label svg {
    width: 20px;
    height: 20px;
    fill: #D42027;
  }

  .qr-container {
    width: 320px;
    height: 320px;
    background: #FFFFFF;
    border-radius: 20px;
    border: 2px solid #E5E7EB;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 24px rgba(26,39,68,0.06);
    padding: 16px;
  }

  .qr-image {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 8px;
  }

  .group-name {
    font-size: 20px;
    font-weight: 600;
    color: #1A2744;
    text-align: center;
    line-height: 1.4;
  }

  .group-link {
    font-size: 13px;
    font-weight: 400;
    color: #7D8AA0;
    text-align: center;
    direction: ltr;
  }

  /* Features row */
  .features-row {
    display: flex;
    gap: 32px;
    position: relative;
    z-index: 1;
    justify-content: center;
    padding: 0 60px;
  }

  .feature {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    text-align: center;
  }

  .feature-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: #FEF2F2;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .feature-icon svg {
    width: 20px;
    height: 20px;
    fill: #D42027;
  }

  .feature-label {
    font-size: 12px;
    font-weight: 600;
    color: #1A2744;
    line-height: 1.3;
  }

  .feature-sub {
    font-size: 11px;
    font-weight: 400;
    color: #7D8AA0;
  }

  /* Bottom bar */
  .bottom-bar {
    background: #1A2744;
    padding: 20px 60px;
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .bottom-contact {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 600;
    color: #FFFFFF;
  }

  .bottom-contact svg {
    width: 18px;
    height: 18px;
    fill: #25D366;
  }

  .bottom-tagline {
    font-size: 14px;
    font-weight: 600;
    color: #D42027;
  }
</style>
</head>
<body>
<div class="post">
  <!-- Navy header -->
  <div class="top-header">
    <div class="header-text">
      <div class="header-overline">انضم لجروب</div>
      <div class="header-title">مركز هارفورد التعليمي</div>
      <div class="header-subtitle">على واتساب</div>
    </div>
    <img class="logo-mark" src="../design-system/logo/mark.png" alt="H">
  </div>

  <!-- Main QR area -->
  <div class="main-content">
    <div class="scan-label">
      <svg viewBox="0 0 24 24"><path d="M3 11h8V3H3v8zm2-6h4v4H5V5zM3 21h8v-8H3v8zm2-6h4v4H5v-4zM13 3v8h8V3h-8zm6 6h-4V5h4v4zM13 13h2v2h-2zM15 15h2v2h-2zM13 17h2v2h-2zM17 13h2v2h-2zM19 15h2v2h-2zM17 17h2v2h-2zM15 19h2v2h-2zM19 19h2v2h-2z"/></svg>
      امسح الـ QR وانضم للجروب
    </div>

    <!-- QR code -->
    <div class="qr-container">
      <img class="qr-image" src="qr-code-extracted.png" alt="QR Code">
    </div>

    <div class="group-name">جروب سنتر هارفورد</div>
    <div class="group-link">facebook.com/Harvrd.edu</div>
  </div>

  <!-- Features -->
  <div class="features-row">
    <div class="feature">
      <div class="feature-icon">
        <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      </div>
      <div class="feature-label">نخبة من المدرسين</div>
      <div class="feature-sub">14 مدرس متخصص</div>
    </div>
    <div class="feature">
      <div class="feature-icon">
        <svg viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z"/></svg>
      </div>
      <div class="feature-label">مراجعة شاملة</div>
      <div class="feature-sub">لكل أجزاء المنهج</div>
    </div>
    <div class="feature">
      <div class="feature-icon">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
      </div>
      <div class="feature-label">أهم الأسئلة</div>
      <div class="feature-sub">والنقاط المتوقعة</div>
    </div>
    <div class="feature">
      <div class="feature-icon">
        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      </div>
      <div class="feature-label">تركيز على</div>
      <div class="feature-sub">النقاط المهمة</div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <div class="bottom-contact">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.832-1.438A9.955 9.955 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/></svg>
      <span dir="ltr">01064949395</span> | <span dir="ltr">02-24734371</span>
    </div>
    <div class="bottom-tagline">معاك للنهاية</div>
  </div>
</div>
</body>
</html>
